seed: 42

dataset:
  name: kaggle_dr
  csv_path: data/smoke/trainLabels.csv
  image_dir: data/smoke/images
  image_size: 224
  max_samples: 64
  allow_missing_images: true

model:
  backbone: resnet18
  num_classes: 5
  pretrained: true

train:
  method: qmix_like
  batch_size: 4
  epochs: 3
  warmup_epochs: 1
  lr: 0.0001
  weight_decay: 0.0001
  val_split: 0.2
  num_workers: 0

output:
  dir: outputs/smoke_qmix_like
