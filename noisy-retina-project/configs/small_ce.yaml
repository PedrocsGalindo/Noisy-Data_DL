seed: 42

name: kaggle_dr
csv_path: samples/trainLabels.csv
image_dir: samples/images
image_size: 224
max_samples: 20
allow_missing_images: false

method: ce
batch_size: 16
epochs: 1
lr: 0.0001
weight_decay: 0.0001
test_size: 0.3
val_size: 0.1
num_workers: 2

model:
  backbone: resnet18
  num_classes: 5
  pretrained: true

output:
  dir: outputs/kaggle_small_ce
